services:
  - type: web
    name: google-places-scraper
    runtime: python
    buildCommand: |
      pip install -r backend/requirements.txt
      cd frontend && npm install && REACT_APP_API_URL="" npm run build
    startCommand: cd backend && gunicorn app:app --bind 0.0.0.0:$PORT --workers 2
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: GOOGLE_PLACES_API_KEY
        sync: false
      - key: FLASK_ENV
        value: production
      - key: FLASK_DEBUG
        value: "False"
